<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Право (Часть 1) – Карточки</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --card-front-bg: #ffffff;
      --card-back-bg: #eff6ff;
      --border-color: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #10b981;
      --shadow-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-front-bg: #1e293b;
      --card-back-bg: #172554;
      --border-color: #334155;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --success: #34d399;
      --shadow-color: rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; }

    .app-container {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-color) 0%, var(--card-front-bg) 100%);
      color: var(--text-main);
      font-family: system-ui, -apple-system, sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
    }

    /* Header */
    .header {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (min-width: 768px) {
      .header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }

    .header-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.5rem 0; }
    .header-subtitle { font-size: 0.875rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; margin: 0; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Typography & Icons */
    .icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    .icon-sm { width: 1rem; height: 1rem; }
    .icon-lg { width: 1.75rem; height: 1.75rem; }
    .text-success { color: var(--success); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      background: var(--card-front-bg);
      color: var(--text-main);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-icon { padding: 0.5rem; border-radius: 0.5rem; }
    
    /* Синяя кнопка для полноэкранного режима */
    .btn.btn-blue {
      background-color: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .btn.btn-blue:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* Horizontal Scroll Tabs */
    .tabs-wrapper {
      width: 100%;
      max-width: 800px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-bottom: 2rem;
    }
    .tabs-wrapper::-webkit-scrollbar { display: none; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
    }
    .tab {
      white-space: nowrap;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: var(--card-front-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s ease;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Status text */
    .status-text {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    /* Card */
    .card-wrapper {
      width: 100%;
      max-width: 600px;
      height: 320px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 2.5rem;
    }
    @media (min-width: 768px) { .card-wrapper { height: 384px; } }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 10px 25px var(--shadow-color);
      border-radius: 1rem;
    }
    .card-wrapper.flipped .card-inner { transform: rotateX(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      border-radius: 1rem;
      border-top: 4px solid;
      transition: background-color 0.3s ease, border-color 0.3s ease;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border-color) transparent;
    }

    .card-face::-webkit-scrollbar { width: 6px; }
    .card-face::-webkit-scrollbar-track { background: transparent; }
    .card-face::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }

    .card-front {
      background: var(--card-front-bg);
      border-top-color: var(--accent);
    }
    .card-back {
      background: var(--card-back-bg);
      border-top-color: var(--success);
      transform: rotateX(180deg);
    }

    .card-label {
      position: absolute;
      top: 1.25rem;
      left: 1.25rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-front .card-label { color: var(--accent); }
    .card-back .card-label { color: var(--success); }

    .card-content { 
      font-size: 1.25rem; 
      font-weight: 600; 
      line-height: 1.5; 
      width: 100%;
      margin: 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
      transition: font-size 0.2s ease;
    }
    @media (min-width: 768px) { .card-content { font-size: 1.5rem; } }
    .card-back .card-content { font-weight: 500; color: var(--text-main); }

    .card-hint {
      position: absolute;
      bottom: 1.25rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      animation: pulse 2s infinite;
    }

    /* Лаконичная подсказка с номером темы */
    .card-topic-hint {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border-color);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    @media (min-width: 768px) { .controls { gap: 1.5rem; } }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--card-front-bg);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-control:hover { transform: scale(1.05); border-color: var(--accent); }

    .btn-nav { width: 3rem; height: 3rem; }
    .btn-action { width: 3rem; height: 3rem; color: var(--text-muted); }
    .btn-action.active { background: var(--success); color: #fff; border-color: var(--success); }

    .btn-main {
      width: 3.5rem; height: 3.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      box-shadow: 0 4px 10px var(--shadow-color);
    }
    .btn-main:hover { background: var(--accent-hover); }
    @media (min-width: 768px) {
      .btn-nav, .btn-action { width: 3.5rem; height: 3.5rem; }
      .btn-main { width: 4rem; height: 4rem; }
    }

    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 1.125rem;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Библиотека inline SVG-иконок -->

  <div class="app-container">
    <!-- Шапка -->
    <div class="header">
      <div>
        <h1 class="header-title">Раздел 5. Право (Часть 1)</h1>
        <p class="header-subtitle" id="header-subtitle">
          <svg class="icon icon-sm text-success"><use href="#icon-check-circle"></use></svg>
          <span id="file-status-text">Встроена полная база: раздел 5, часть 1 (82 термина)</span>
        </p>
      </div>
      
      <div class="header-actions">
        <button class="btn btn-icon" id="btn-theme" title="Переключить тему">
          <svg class="icon"><use id="theme-icon-use" href="#icon-moon"></use></svg>
        </button>
        <!-- Синяя кнопка для перехода в полноэкранный режим -->
        <button class="btn btn-icon btn-blue" id="btn-fullscreen" title="Полноэкранный режим">
          <svg class="icon"><use id="fullscreen-icon-use" href="#icon-maximize"></use></svg>
        </button>
        <button class="btn" id="btn-upload">
          <svg class="icon icon-sm"><use href="#icon-upload"></use></svg>
          Загрузить
        </button>
        <input type="file" accept=".csv" id="file-input" style="display: none;" />
      </div>
    </div>

    <!-- Навигация (вкладки) -->
    <div class="tabs-wrapper">
      <div class="tabs" id="tabs-container">
        <button class="tab active" data-tab="all" id="tab-all">Все термины (0)</button>
        <button class="tab" data-tab="learning" id="tab-learning">Осталось выучить (0)</button>
        <button class="tab" data-tab="learned" id="tab-learned">Выученные (0)</button>
      </div>
    </div>

    <!-- Карточка и элементы управления -->
    <div id="main-content" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
      <div class="status-text" id="status-text">Карточка 1 из 0</div>

      <div class="card-wrapper" id="card-wrapper">
        <div class="card-inner">
          <div class="card-face card-front">
            <span class="card-label">Вопрос</span>
            <h2 class="card-content" id="card-question"></h2>
            <p class="card-hint">Нажмите, чтобы перевернуть</p>
          </div>
          <div class="card-face card-back">
            <span class="card-label">Ответ</span>
            <p class="card-content" id="card-answer"></p>
            <div class="card-topic-hint" id="card-topic-hint"></div>
          </div>
        </div>
      </div>

      <div class="controls" id="controls">
        <button class="btn-control btn-action" id="btn-shuffle" title="Перемешать все">
          <svg class="icon"><use href="#icon-shuffle"></use></svg>
        </button>
        <button class="btn-control btn-nav" id="btn-prev" title="Предыдущая">
          <svg class="icon"><use href="#icon-prev"></use></svg>
        </button>
        <button class="btn-control btn-main" id="btn-next" title="Следующая">
          <svg class="icon icon-lg"><use href="#icon-next"></use></svg>
        </button>
        <button class="btn-control btn-action" id="btn-check" title="Отметить как выученное">
          <svg class="icon"><use href="#icon-check"></use></svg>
        </button>
      </div>
    </div>

    <!-- Пустое состояние -->
    <div class="empty-state" id="empty-state">
      В этой категории пока нет карточек.
    </div>
  </div>

  <script>
    // База карточек по разделу 5, часть 1 (82 термина)
    const defaultCards = [
      { id: '1', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'Что такое право?', answer: 'Это система общеобязательных, формально определенных норм, установленных и охраняемых государством.' },
      { id: '2', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'Какова главная цель права?', answer: 'Регулирование общественных отношений и поддержание порядка в государстве.' },
      { id: '3', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'Назовите основные признаки права.', answer: 'К ним относятся: общеобязательность, формальная определенность, обеспеченность силой государства, системность.' },
      { id: '4', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'Что означает признак «формальная определенность» права?', answer: 'Нормы права закреплены в официальных письменных документах (законах, кодексах).' },
      { id: '5', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'Что означает признак «общеобязательность» права?', answer: 'Нормы права обязательны для исполнения всеми гражданами, организациями и государственными органами.' },
      { id: '6', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'В чем отличие норм права от норм морали по способу обеспечения?', answer: 'Нормы права обеспечиваются принудительной силой государства, а мораль – силой общественного мнения.' },
      { id: '7', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'В чем отличие норм права от норм морали по форме выражения?', answer: 'Право всегда закреплено в официальных документах, а мораль существует в сознании людей.' },
      { id: '8', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'Что такое объективное право?', answer: 'Это система действующих в государстве правовых норм.' },
      { id: '9', topic: 'Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА', question: 'Что такое субъективное право?', answer: 'Официально признанные возможности, которыми располагает конкретный человек (например, право на образование).' },
      { id: '10', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'Каковы основные функции права?', answer: 'К ним относятся: регулятивная, охранительная, воспитательная и оценочная.' },
      { id: '11', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'В чем заключается регулятивная функция права?', answer: 'В упорядочивании общественных отношений и установлении правил поведения.' },
      { id: '12', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'В чем заключается охранительная функция права?', answer: 'В защите наиболее важных общественных отношений и наказании правонарушителей.' },
      { id: '13', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'Что такое норма права?', answer: 'Установленное государством общеобязательное правило поведения, регулирующее конкретное общественное отношение.' },
      { id: '14', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'Назовите три элемента структуры правовой нормы.', answer: 'К ним относятся: гипотеза, диспозиция и санкция.' },
      { id: '15', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'Что такое гипотеза в структуре правовой нормы?', answer: 'Элемент, указывающий на жизненные обстоятельства, при которых норма вступает в действие.' },
      { id: '16', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'Что такое диспозиция в структуре правовой нормы?', answer: 'Само правило поведения, права и обязанности субъектов.' },
      { id: '17', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'Что такое санкция в структуре правовой нормы?', answer: 'Неблагоприятные последствия, наступающие за нарушение правила (диспозиции).' },
      { id: '18', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'На какие виды делятся нормы права по характеру предписания?', answer: 'На управомочивающие, обязывающие и запрещающие.' },
      { id: '19', topic: 'Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.', question: 'Приведите пример запрещающей нормы права.', answer: 'Закон запрещает управлять автомобилем в состоянии алкогольного опьянения.' },
      { id: '20', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'Что такое источник (форма) права?', answer: 'Официально закрепленные формы внешнего выражения содержания права.' },
      { id: '21', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'Назовите основные источники права.', answer: 'К ним относятся: правовой обычай, судебный прецедент, нормативный договор, нормативный правовой акт.' },
      { id: '22', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'Что такое правовой обычай?', answer: 'Исторически сложившееся правило поведения, санкционированное государством.' },
      { id: '23', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'Что такое судебный прецедент?', answer: 'Решение суда по конкретному делу, которое становится правилом для разрешения аналогичных дел в будущем.' },
      { id: '24', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'Что такое нормативный правовой акт (НПА)?', answer: 'Официальный документ, изданный государственным органом и содержащий правовые нормы.' },
      { id: '25', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'На какие два основных вида делятся нормативные правовые акты?', answer: 'На законы и подзаконные акты.' },
      { id: '26', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'Что такое закон?', answer: 'Нормативный правовой акт, принятый высшим законодательным органом власти и обладающий высшей юридической силой.' },
      { id: '27', topic: 'Тема 3. ИСТОЧНИКИ ПРАВА', question: 'Что такое подзаконный акт?', answer: 'Нормативный документ, изданный на основе и во исполнение законов (указы, постановления, приказы).' },
      { id: '28', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Что такое правоотношения?', answer: 'Общественные отношения, урегулированные нормами права, участники которых имеют взаимные права и обязанности.' },
      { id: '29', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Назовите элементы структуры правоотношения.', answer: 'К ним относятся: субъекты, объект и содержание правоотношения.' },
      { id: '30', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Кто может быть субъектом правоотношений?', answer: 'Физические лица, юридические лица и публично-правовые образования (государство).' },
      { id: '31', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Что является объектом правоотношения?', answer: 'Материальные и нематериальные блага, по поводу которых возникает правоотношение.' },
      { id: '32', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Что включает в себя содержание правоотношения?', answer: 'Субъективные права и юридические обязанности участников.' },
      { id: '33', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Что такое правоспособность?', answer: 'Установленная законом способность лица иметь субъективные права и нести юридические обязанности.' },
      { id: '34', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'С какого момента возникает правоспособность у физического лица?', answer: 'С момента рождения (и прекращается со смертью).' },
      { id: '35', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Что такое дееспособность?', answer: 'Способность лица своими действиями приобретать и осуществлять права, создавать и исполнять обязанности.' },
      { id: '36', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'С какого возраста наступает полная дееспособность в РФ?', answer: 'С 18 лет (по общему правилу).' },
      { id: '37', topic: 'Тема 4. ПРАВООТНОШЕНИЯ', question: 'Что такое эмансипация в праве?', answer: 'Объявление несовершеннолетнего, достигшего 16 лет, полностью дееспособным (при работе по найму или занятии бизнесом).' },
      { id: '38', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Что такое правонарушение?', answer: 'Общественно опасное виновное деяние, противоречащее нормам права и наносящее вред обществу.' },
      { id: '39', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Назовите основные признаки правонарушения.', answer: 'К ним относятся: деяние (действие или бездействие), противоправность, виновность, общественная опасность.' },
      { id: '40', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'На какие два вида делятся правонарушения по степени опасности?', answer: 'На преступления и проступки.' },
      { id: '41', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Что такое преступление?', answer: 'Наиболее общественно опасное виновное деяние, запрещенное уголовным законодательством.' },
      { id: '42', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Что такое проступок?', answer: 'Виновное деяние, имеющее меньшую степень общественной опасности по сравнению с преступлением.' },
      { id: '43', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Назовите виды проступков.', answer: 'К ним относятся: дисциплинарные, административные и гражданско-правовые.' },
      { id: '44', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Что такое юридическая ответственность?', answer: 'Применение мер государственного принуждения к виновному лицу за совершенное правонарушение.' },
      { id: '45', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Каковы основные цели юридической ответственности?', answer: 'К ним относятся: карательная (штрафная), превентивная (предупредительная) и восстановительная.' },
      { id: '46', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Назовите основные виды юридической ответственности.', answer: 'К ним относятся: уголовная, административная, гражданско-правовая, дисциплинарная, материальная.' },
      { id: '47', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'За какие деяния наступает уголовная ответственность?', answer: 'Только за совершение преступлений, предусмотренных Уголовным кодексом.' },
      { id: '48', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Каковы меры дисциплинарной ответственности по Трудовому кодексу РФ?', answer: 'К ним относятся: замечание, выговор, увольнение.' },
      { id: '49', topic: 'Тема 5. ЮРИДИЧЕСКАЯ ОТВЕТСТВЕННОСТЬ', question: 'Какова основная цель гражданско-правовой ответственности?', answer: 'Полное возмещение причиненного имущественного вреда.' },
      { id: '50', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Что такое система права?', answer: 'Внутренняя структура права, выражающаяся в единстве и согласованности норм и их разделении на отрасли и институты.' },
      { id: '51', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Назовите основные элементы системы права.', answer: 'К ним относятся: норма права, институт права и отрасль права.' },
      { id: '52', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Что такое отрасль права?', answer: 'Совокупность правовых норм, регулирующих самостоятельную сферу общественных отношений.' },
      { id: '53', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Что такое институт права?', answer: 'Обособленный комплекс правовых норм внутри отрасли, регулирующий определенный вид однородных отношений.' },
      { id: '54', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'На какие две большие группы делится право по характеру интересов?', answer: 'На публичное и частное право.' },
      { id: '55', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Что характерно для публичного права?', answer: 'Оно защищает государственные интересы и основано на отношениях власти и подчинения (императивный метод).' },
      { id: '56', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Какие отрасли относятся к публичному праву?', answer: 'К ним относятся: конституционное, административное, уголовное, финансовое право.' },
      { id: '57', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Что характерно для частного права?', answer: 'Оно защищает частные интересы и основано на равенстве и автономии сторон (диспозитивный метод).' },
      { id: '58', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Какие отрасли относятся к частному праву?', answer: 'К ним относятся: гражданское, семейное, предпринимательское право.' },
      { id: '59', topic: 'Тема 6. СИСТЕМА ПРАВА РОССИЙКОЙ ФЕДЕРАЦИИ', question: 'Что такое материальное право?', answer: 'Отрасли права, которые непосредственно регулируют общественные отношения (устанавливают права и обязанности).' },
      { id: '60', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Что такое конституционное право?', answer: 'Ведущая отрасль права, закрепляющая основы конституционного строя, права и свободы граждан.' },
      { id: '61', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Что такое Конституция?', answer: 'Основной закон государства, обладающий высшей юридической силой и прямым действием.' },
      { id: '62', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'В каком году была принята действующая Конституция РФ?', answer: 'В 1993 году (на всенародном голосовании).' },
      { id: '63', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Что означает характеристика РФ как демократического государства?', answer: 'Единственным источником власти в стране является ее многонациональный народ.' },
      { id: '64', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Что означает характеристика РФ как социального государства?', answer: 'Политика государства направлена на создание условий, обеспечивающих достойную жизнь и свободное развитие человека.' },
      { id: '65', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Что означает характеристика РФ как светского государства?', answer: 'Никакая религия не может устанавливаться в качестве государственной или обязательной.' },
      { id: '66', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'На какие три основные группы делятся права и свободы человека и гражданина в РФ?', answer: 'На личные (гражданские), политические, социально-экономические и культурные.' },
      { id: '67', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Приведите примеры личных (гражданских) прав.', answer: 'К ним относятся: право на жизнь, свободу и личную неприкосновенность, неприкосновенность жилища, свободу передвижения.' },
      { id: '68', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Приведите примеры политических прав.', answer: 'К ним относятся: право избирать и быть избранным, право на мирные собрания и митинги, право на объединение.' },
      { id: '69', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Приведите примеры социально-экономических прав.', answer: 'К ним относятся: право на частную собственность, свободу предпринимательства, право на труд и отдых.' },
      { id: '70', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Перечислите основные конституционные обязанности граждан РФ.', answer: 'К ним относятся: соблюдение законов, уплата налогов, защита Отечества, сохранение природы, забота о детях и нетрудоспособных родителях.' },
      { id: '71', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Является ли получение основного общего образования обязанностью гражданина РФ?', answer: 'Да, это прямо закреплено в Конституции РФ.' },
      { id: '72', topic: 'Тема 7. КОНСТИТУЦИОННОЕ ПРАВО', question: 'Что такое гражданство?', answer: 'Устойчивая политико-правовая связь человека с государством, выражающаяся в совокупности их взаимных прав и обязанностей.' },
      { id: '73', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Что регулирует семейное право?', answer: 'Личные неимущественные и имущественные отношения между членами семьи (супругами, родителями, детьми).' },
      { id: '74', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Что такое брак по семейному праву?', answer: 'Свободный и добровольный союз мужчины и женщины, зарегистрированный в органах ЗАГС.' },
      { id: '75', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Назовите обязательные условия заключения брака в РФ.', answer: 'Взаимное добровольное согласие мужчины и женщины, достижение ими брачного возраста (18 лет).' },
      { id: '76', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Назовите обстоятельства, препятствующие заключению брака.', answer: 'К ним относятся: состояние в другом браке, близкое родство, усыновление, недееспособность одного из лиц.' },
      { id: '77', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Как делится имущество, нажитое супругами во время брака?', answer: 'Оно является их совместной собственностью и делится поровну, если иное не предусмотрено брачным договором.' },
      { id: '78', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Какое имущество признается личной собственностью супруга?', answer: 'Имущество, принадлежавшее ему до брака, а также полученное в дар или по наследству во время брака.' },
      { id: '79', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Что такое брачный договор?', answer: 'Соглашение лиц, вступающих в брак, или соглашение супругов, определяющее их имущественные права и обязанности.' },
      { id: '80', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'Может ли брачный договор регулировать личные неимущественные отношения?', answer: 'Нет, он регулирует исключительно имущественные вопросы.' },
      { id: '81', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'В какой форме заключается брачный договор?', answer: 'Он заключается в письменной форме и подлежит обязательному нотариальному удостоверению.' },
      { id: '82', topic: 'Тема 8. СЕМЕЙНОЕ ПРАВО', question: 'В каких случаях расторжение брака производится только через суд?', answer: 'При наличии общих несовершеннолетних детей или при отсутствии согласия одного из супругов.' }
    ];

    // Состояние приложения
    let cards = [...defaultCards];
    let learnedIds = new Set();
    let activeTab = 'all';
    let currentIndex = 0;
    let isFlipped = false;
    let theme = 'light';

    // DOM-элементы
    const els = {
      cardWrapper: document.getElementById('card-wrapper'),
      cardQuestion: document.getElementById('card-question'),
      cardAnswer: document.getElementById('card-answer'),
      cardTopicHint: document.getElementById('card-topic-hint'),
      tabAll: document.getElementById('tab-all'),
      tabLearning: document.getElementById('tab-learning'),
      tabLearned: document.getElementById('tab-learned'),
      statusText: document.getElementById('status-text'),
      btnCheck: document.getElementById('btn-check'),
      themeIconUse: document.getElementById('theme-icon-use'),
      btnTheme: document.getElementById('btn-theme'),
      btnFullscreen: document.getElementById('btn-fullscreen'),
      fullscreenIconUse: document.getElementById('fullscreen-icon-use'),
      fileStatusText: document.getElementById('file-status-text'),
      fileInput: document.getElementById('file-input'),
      btnUpload: document.getElementById('btn-upload'),
      emptyState: document.getElementById('empty-state'),
      mainContent: document.getElementById('main-content'),
      btnNext: document.getElementById('btn-next'),
      btnPrev: document.getElementById('btn-prev'),
      btnShuffle: document.getElementById('btn-shuffle')
    };

    // Функция масштабирования текста под размер карточки
    function scaleTextToFit() {
      requestAnimationFrame(() => {
        els.cardQuestion.style.fontSize = '';
        els.cardAnswer.style.fontSize = '';

        const frontFace = document.querySelector('.card-front');
        const backFace = document.querySelector('.card-back');

        const fitText = (container, textElement) => {
          let fontSize = parseFloat(window.getComputedStyle(textElement).fontSize);
          const minFontSize = 14; 

          while (container.scrollHeight > container.clientHeight && fontSize > minFontSize) {
            fontSize -= 0.5;
            textElement.style.fontSize = fontSize + 'px';
          }
        };

        fitText(frontFace, els.cardQuestion);
        fitText(backFace, els.cardAnswer);
      });
    }

    window.addEventListener('resize', scaleTextToFit);

    // Фильтрация
    function getFilteredCards() {
      return cards.filter(card => {
        if (activeTab === 'learned') return learnedIds.has(card.id);
        if (activeTab === 'learning') return !learnedIds.has(card.id);
        return true;
      });
    }

    // Обновление интерфейса
    function updateUI() {
      els.tabAll.textContent = `Все термины (${cards.length})`;
      els.tabLearning.textContent = `Осталось выучить (${cards.length - learnedIds.size})`;
      els.tabLearned.textContent = `Выученные (${learnedIds.size})`;

      const filtered = getFilteredCards();

      if (filtered.length === 0) {
        els.mainContent.style.display = 'none';
        els.emptyState.style.display = 'block';
      } else {
        els.mainContent.style.display = 'flex';
        els.emptyState.style.display = 'none';

        if (currentIndex >= filtered.length) currentIndex = 0;

        const currentCard = filtered[currentIndex];
        els.cardQuestion.textContent = currentCard.question;
        els.cardAnswer.textContent = currentCard.answer;
        els.statusText.textContent = `Карточка ${currentIndex + 1} из ${filtered.length}`;

        // Логика лаконичной подсказки
        if (currentCard.topic) {
          const match = currentCard.topic.match(/^(Тема\s*\d+\.?)/i);
          const shortTopic = match ? match[1] : currentCard.topic;
          
          els.cardTopicHint.innerHTML = `<svg class="icon icon-sm"><use href="#icon-book"></use></svg> <span>${shortTopic}</span>`;
          els.cardTopicHint.style.display = 'flex';
        } else {
          els.cardTopicHint.style.display = 'none';
        }

        if (learnedIds.has(currentCard.id)) {
          els.btnCheck.classList.add('active');
          els.btnCheck.title = 'Убрать из выученных';
        } else {
          els.btnCheck.classList.remove('active');
          els.btnCheck.title = 'Отметить как выученное';
        }

        scaleTextToFit();
      }
    }

    // Обработчики вкладок
    function switchTab(tabId) {
      activeTab = tabId;
      currentIndex = 0;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      
      updateUI();
    }

    els.tabAll.addEventListener('click', () => switchTab('all'));
    els.tabLearning.addEventListener('click', () => switchTab('learning'));
    els.tabLearned.addEventListener('click', () => switchTab('learned'));

    // Переворот карточки
    els.cardWrapper.addEventListener('click', () => {
      isFlipped = !isFlipped;
      els.cardWrapper.classList.toggle('flipped', isFlipped);
    });

    // Навигация
    els.btnNext.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % filtered.length;
        updateUI();
      }, 150);
    });

    els.btnPrev.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
        updateUI();
      }, 150);
    });

    els.btnShuffle.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        cards.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        updateUI();
      }, 150);
    });

    els.btnCheck.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length === 0) return;
      const currentCard = filtered[currentIndex];
      
      if (learnedIds.has(currentCard.id)) {
        learnedIds.delete(currentCard.id);
      } else {
        learnedIds.add(currentCard.id);
      }
      updateUI();
    });

    // Темная тема
    els.btnTheme.addEventListener('click', () => {
      theme = theme === 'light' ? 'dark' : 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        els.themeIconUse.setAttribute('href', '#icon-sun');
      } else {
        document.documentElement.removeAttribute('data-theme');
        els.themeIconUse.setAttribute('href', '#icon-moon');
      }
    });

    // Полноэкранный режим
    function toggleFullscreen() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }

    els.btnFullscreen.addEventListener('click', toggleFullscreen);

    function updateFullscreenIcon() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        els.fullscreenIconUse.setAttribute('href', '#icon-minimize');
      } else {
        els.fullscreenIconUse.setAttribute('href', '#icon-maximize');
      }
    }
    
    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

    // Загрузка файла
    els.btnUpload.addEventListener('click', () => els.fileInput.click());
    
    els.fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const text = event.target.result;
        const parsed = parseCSV(text);
        if (parsed.length > 0) {
          cards = parsed;
          learnedIds.clear();
          currentIndex = 0;
          isFlipped = false;
          els.cardWrapper.classList.remove('flipped');
          els.fileStatusText.textContent = `Загружен файл: ${file.name}`;
          updateUI();
        } else {
          alert('Не удалось распознать карточки. Убедитесь, что формат правильный.');
        }
      };
      reader.readAsText(file);
    });

    function parseCSV(text) {
      const result = [];
      let row = [];
      let inQuotes = false;
      let currentVal = '';
      
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (inQuotes) {
          if (char === '"' && text[i + 1] === '"') {
            currentVal += '"';
            i++;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            currentVal += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(currentVal.trim());
            currentVal = '';
          } else if (char === '\n' || char === '\r') {
            row.push(currentVal.trim());
            if (row.length >= 2 && row[0] && row[1]) {
              result.push({ 
                id: Date.now() + Math.random().toString(), 
                question: row[0], 
                answer: row[1],
                topic: row[2] ? row[2] : '' 
              });
            }
            row = [];
            currentVal = '';
            if (char === '\r' && text[i + 1] === '\n') i++;
          } else {
            currentVal += char;
          }
        }
      }
      if (currentVal || row.length > 0) {
        row.push(currentVal.trim());
        if (row.length >= 2 && row[0] && row[1]) {
          result.push({ 
            id: Date.now() + Math.random().toString(), 
            question: row[0], 
            answer: row[1],
            topic: row[2] ? row[2] : ''
          });
        }
      }
      return result;
    }

    updateUI();
  </script>
</body>
</html>
